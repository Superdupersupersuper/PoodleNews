<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PoodleNews</title>
    <link rel="stylesheet" href="/styles">
  </head>
  <body>
    <header class="deckbar">
      <div class="brand">
        <div class="mark">NA</div>
        <div>
          <h1>PoodleNews</h1>
          <p id="clock">--:--:--</p>
        </div>
      </div>
      <div class="deck-controls">
        <label>
          <span>Search</span>
          <input id="search" type="search" placeholder="Ticker, person, keyword">
        </label>
      </div>
      <div class="stats">
        <span id="itemCount">0 items</span>
        <span id="lastUpdate">Waiting</span>
        <a class="nav-button" href="/admin" aria-label="Open settings">Settings</a>
      </div>
    </header>

    <main class="deck">
      <section class="column social-column">
        <header class="column-head">
          <div>
            <p class="eyebrow">Critical lane</p>
            <h2>Trump Social Media</h2>
          </div>
          <span id="socialCount" class="counter">0</span>
        </header>
        <div id="socialHealth" class="health-strip"></div>
        <section id="socialFeed" class="feed"></section>
      </section>

      <section class="column white-house-column">
        <header class="column-head">
          <div>
            <p class="eyebrow">Press pool</p>
            <h2>White House X</h2>
          </div>
          <span id="whiteHouseCount" class="counter">0</span>
        </header>
        <section id="whiteHouseFeed" class="feed empty-feed"></section>
      </section>

      <section class="column headlines-column">
        <header class="column-head">
          <div>
            <p class="eyebrow">Headline wire</p>
            <h2>Headlines</h2>
          </div>
          <span id="headlineCount" class="counter">0</span>
        </header>
        <div class="keyword-panel">
          <span>Watchlist</span>
          <div id="keywords" class="keywords"></div>
        </div>
        <section id="headlineFeed" class="feed empty-feed"></section>
      </section>
    </main>

    <template id="itemTemplate">
      <article class="item">
        <div class="item-meta">
          <span class="source"></span>
          <span class="age"></span>
        </div>
        <a class="title" target="_blank" rel="noreferrer"></a>
        <p class="summary"></p>
        <div class="media" hidden></div>
        <div class="tags"></div>
      </article>
    </template>

    <dialog id="truthHealthDialog" class="health-dialog">
      <form method="dialog" class="health-dashboard">
        <header class="dashboard-head">
          <div>
            <p class="eyebrow">Critical lane diagnostics</p>
            <h2>Trump Truth Social Health</h2>
          </div>
          <button class="icon-button" value="close" aria-label="Close health dashboard" type="submit">x</button>
        </header>
        <div id="truthHealthBody" class="dashboard-body">
          <div class="empty">Loading Truth Social health.</div>
        </div>
      </form>
    </dialog>

    <script type="module" src="/app"></script>
  </body>
</html>
