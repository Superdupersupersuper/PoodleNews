<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PoodleNews Settings</title>
    <link rel="stylesheet" href="/styles">
  </head>
  <body class="admin-page">
    <header class="deckbar admin-bar">
      <div class="brand">
        <div class="mark">NA</div>
        <div>
          <h1>PoodleNews Settings</h1>
          <p>Backend controls</p>
        </div>
      </div>
      <div class="deck-controls"></div>
      <div class="stats">
        <span id="adminStatus">Loading</span>
        <button id="logoutButton" class="nav-button button-link" type="button" hidden>Log out</button>
        <a class="nav-button" href="/">Live deck</a>
      </div>
    </header>

    <main id="loginShell" class="admin-shell login-shell" hidden>
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">Settings locked</p>
        <h2>Enter Password</h2>
        <input id="passwordInput" name="password" type="password" autocomplete="current-password" autofocus>
        <button type="submit">Unlock</button>
        <p id="loginMessage" class="login-message" aria-live="polite"></p>
      </form>
    </main>

    <main id="adminShell" class="admin-shell" hidden>
      <section class="admin-intro">
        <p class="eyebrow">Settings</p>
        <h2>X Sources</h2>
      </section>
      <section id="xListAdmin" class="admin-grid"></section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
